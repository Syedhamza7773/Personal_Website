<!DOCTYPE html>
<html>
<head>

<title>Thank You</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f7;
    font-family: Arial, sans-serif;
}


.thankyou-box {

    text-align: center;
    background: white;
    padding: 50px;
    border-radius: 15px;
    width: 500px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.15);

}


h1 {

    font-size: 40px;
    color: #333;
    margin-bottom: 20px;

}


p {

    font-size: 18px;
    color: #555;
    line-height: 1.6;

}


a {

    display: inline-block;
    margin-top: 25px;

    padding: 12px 25px;

    background: #6c5ce7;
    color: white;

    text-decoration: none;

    border-radius: 25px;

    font-size: 16px;

}


a:hover {

    background: #4834d4;

}


</style>

</head>


<body>


<div class="thankyou-box">


<h1>Thank You!</h1>


<p>
Your response has been saved successfully.<br>
I will review your message and get back to you shortly.
</p>


<a href="index.html">
Return to Portfolio
</a>


</div>


</body>

</html>
